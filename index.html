<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ My Notes ✨</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Aurora canvas background -->
  <canvas id="auroraCanvas" aria-hidden="true"></canvas>

  <!-- Floating CSS glow orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>
  <div class="orb orb-4" aria-hidden="true"></div>
  <div class="orb orb-5" aria-hidden="true"></div>

  <header>
    <h1>💖 My Notes</h1>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" placeholder="Search notes...">
      </div>
      <button id="addBtn">🌸 New Note</button>
      <button id="themeBtn" title="Toggle day mode">☀️</button>
    </div>
  </header>

  <div id="notesContainer" class="notes-container"></div>

  <!-- NOTE MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-emoji">📝</span>
        <h2>New Note</h2>
      </div>
      <input id="noteTitle" placeholder="✨ Note title...">
      <textarea id="noteText" placeholder="Write something cute here... 💕"></textarea>
      <div class="color-row">
        <label for="noteColor">🎨 Pick a color</label>
        <input type="color" id="noteColor" value="#ffd6e7">
      </div>
      <div class="modal-buttons">
        <button id="saveNote">💾 Save</button>
        <button id="closeModal">✖ Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
  /* ═══════════════════════════════════════
     AURORA CANVAS — animated galaxy mesh
  ═══════════════════════════════════════ */
  (function () {
    const canvas = document.getElementById('auroraCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H, t  = 0;

    const STAR_COUNT = 150;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.6 + 0.2,
      baseAlpha: Math.random() * 0.75 + 0.2,
      speed: Math.random() * 0.0009 + 0.0002,
      phase: Math.random() * Math.PI * 2
    }));

    const blobs = [
      { x: 0.18, y: 0.28, r: 0.60, col: [255, 80,  210], spd: 0.00032, ox: 0.0, oy: 0.0 },
      { x: 0.78, y: 0.18, r: 0.55, col: [140, 80,  255], spd: 0.00025, ox: 1.0, oy: 0.5 },
      { x: 0.50, y: 0.72, r: 0.65, col: [60,  160, 255], spd: 0.00040, ox: 2.0, oy: 1.0 },
      { x: 0.88, y: 0.78, r: 0.48, col: [255, 150, 80 ], spd: 0.00029, ox: 3.0, oy: 1.5 },
      { x: 0.08, y: 0.82, r: 0.44, col: [140, 255, 180], spd: 0.00036, ox: 4.0, oy: 2.0 },
      { x: 0.58, y: 0.35, r: 0.42, col: [255, 120, 255], spd: 0.00044, ox: 5.0, oy: 2.5 },
    ];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function draw() {
      t++;
      ctx.clearRect(0, 0, W, H);

      const base = ctx.createLinearGradient(0, 0, W * 0.6, H);
      base.addColorStop(0, '#110025');
      base.addColorStop(1, '#040f08');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();
  </script>

</body>
</html>
